# Docker Compose: sadece backend + redis + worker.
# Frontend local'de (npm run dev) — bu sayede:
# - Hızlı iteration (Next.js hot reload)
# - Docker image kucuk (sadece Python + torch)
# - BGE modeli tek build'de cache'lenir

services:
  redis:
    image: redis:7-alpine
    container_name: rag-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: rag-backend:latest
    container_name: rag-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?OPENROUTER_API_KEY gerekli - .env'e yaz}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_MODEL: ${LLM_MODEL:-openai/gpt-4o-mini}
      BGE_MODEL_NAME: ${BGE_MODEL_NAME:-BAAI/bge-small-en-v1.5}
      BGE_DEVICE: ${BGE_DEVICE:-cpu}
      BGE_BATCH_SIZE: ${BGE_BATCH_SIZE:-16}
      CHUNK_SIZE: ${CHUNK_SIZE:-800}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-120}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - rag-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - rag-net

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: rag-backend:latest
    container_name: rag-worker
    restart: unless-stopped
    command: ["celery", "-A", "app.celery_app", "worker", "--loglevel=info", "--concurrency=1"]
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?OPENROUTER_API_KEY gerekli - .env'e yaz}
      BGE_MODEL_NAME: ${BGE_MODEL_NAME:-BAAI/bge-small-en-v1.5}
      BGE_DEVICE: ${BGE_DEVICE:-cpu}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - rag-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - rag-net

volumes:
  redis-data:
    name: rag-redis-data
  rag-data:
    name: rag-data

networks:
  rag-net:
    name: rag-net
    driver: bridge
